            ],
            preguntas: [
                { p: 'Ejemplo de proteína cuaternaria:', ops: ['Colágeno','Hemoglobina','Mioglobina','Insulina'], corr:1 },
                { p: 'En tejidos periféricos la curva de Hb se desplaza:', ops: ['Izquierda','Derecha','No cambia','Vertical'], corr:1 },
                { p: 'Carga neta del tripéptido Lys-Glu-Lys a pH 7 (incluye terminales):', ops: ['+2','+1','-1','0'], corr:1 }, // Lys(+1) Glu(-1) Lys(+1) y terminal NH3+ COO- se anulan? En realidad suma: NH3+ (+1), Lys (+1), Glu (-1), Lys (+1), COO- (-1) = +1.
                { p: 'La hidroxilación de prolina en colágeno requiere:', ops: ['Vitamina A','Vitamina C','Vitamina D','Vitamina E'], corr:1 }
            ]
        }
    ];

    let guiaActual = 0;
    let utterance = null;

    const menuDiv = document.getElementById('menuGuias');
    const tituloGuia = document.getElementById('tituloGuia');
    const contenidoGuia = document.getElementById('contenidoGuia');
    const evalDiv = document.getElementById('evaluacionGuia');
    const bubble = document.getElementById('bubble');

    // Construir menú
    guias.forEach((g, idx) => {
        const btn = document.createElement('button');
        btn.className = 'boton-guia';
        btn.innerText = g.titulo;
        btn.onclick = () => cargarGuia(idx);
        menuDiv.appendChild(btn);
    });

    function cargarGuia(index) {
        guiaActual = index;
        const g = guias[index];
        tituloGuia.innerText = g.titulo;
        let htmlCont = '';
        g.contenido.forEach(p => htmlCont += `<p>${p}</p>`);
        contenidoGuia.innerHTML = htmlCont;

        let evalHtml = '<h2 style="color:#b7ecff">📝 Evaluación del tema</h2>';
        g.preguntas.forEach((item, i) => {
            evalHtml += `<div class="pregunta" id="preg${i}">`;
            evalHtml += `<div style="font-weight:bold; font-size:1.2rem;">${i+1}. ${item.p}</div>`;
            evalHtml += `<div class="opciones" id="opc${i}">`;
            item.ops.forEach((opt, oIdx) => {
                evalHtml += `<div class="opcion" data-preg="${i}" data-opt="${oIdx}">${String.fromCharCode(65+oIdx)}. ${opt}</div>`;
            });
            evalHtml += `</div><div class="feedback" id="fb${i}"></div>`;
            evalHtml += '</div>';
        });
        evalHtml += '<p style="margin-top:15px">✅ Haz clic en cada opción para ver si es correcta.</p>';
        evalDiv.innerHTML = evalHtml;

        document.querySelectorAll('.opcion').forEach(el => {
            el.addEventListener('click', (e) => {
                const pregIdx = el.dataset.preg;
                const optIdx = parseInt(el.dataset.opt);
                const pregunta = guias[guiaActual].preguntas[pregIdx];
                const correcta = pregunta.corr;
                const fb = document.getElementById(`fb${pregIdx}`);
                const opcionesMisma = document.querySelectorAll(`[data-preg="${pregIdx}"]`);
                opcionesMisma.forEach(op => op.classList.remove('correcta', 'incorrecta'));
                if (optIdx === correcta) {
                    el.classList.add('correcta');
                    fb.innerText = '✅ ¡Correcto!';
                    fb.style.color = 'lightgreen';
                } else {
                    el.classList.add('incorrecta');
                    fb.innerText = `❌ Incorrecto. Correcta: ${String.fromCharCode(65+correcta)}: ${pregunta.ops[correcta]}`;
                    fb.style.color = 'lightcoral';
                }
            });
        });
        bubble.innerHTML = `🧑‍🏫 Tema: ${g.titulo}. Usa los botones.`;
    }

    document.getElementById('ampliarInfoBtn').addEventListener('click', () => {
        const extraTips = [
            "La anhidrasa carbónica es clave en saliva y eritrocitos.",
            "El fluoruro inhibe la enolasa (glucólisis) y la aconitasa (Krebs).",
            "La carnitina transporta AG a la matriz mitocondrial.",
            "La hemoglobina tiene efecto Bohr por grupos histidina.",
            "Los edulcorantes como sorbitol se obtienen por reducción de monosacáridos."
        ];
        bubble.innerHTML = `💡 Dato extra: ${extraTips[Math.floor(Math.random() * extraTips.length)]}`;
    });

    document.getElementById('leerBtn').addEventListener('click', () => {
        if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
        const g = guias[guiaActual];
        let texto = `Tema: ${g.titulo}. `;
        g.contenido.forEach(p => texto += p.replace(/🔹/g,'') + '. ');
        texto += ' Ahora responde la evaluación.';
        utterance = new SpeechSynthesisUtterance(texto);
        utterance.lang = 'es-ES';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
        bubble.innerHTML = '🔊 Reproduciendo... Usa "Detener".';
    });

    document.getElementById('detenerBtn').addEventListener('click', () => {
        window.speechSynthesis.cancel();
        bubble.innerHTML = '⏹️ Lectura detenida.';
    });

    cargarGuia(0);
})();
</script>
</body>
</html>
